<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Склад — Вход в систему</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">

      <div class="login-header">
        <div class="logo-mark">СК</div>
        <h1>Система управления складом</h1>
        <p>Введите учётные данные для входа</p>
      </div>

      <div id="login-alert" class="alert alert-error" style="display:none"></div>

      <form id="login-form" autocomplete="off" novalidate>

        <div class="form-group">
          <label for="username">Логин</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-control"
            placeholder="Введите логин"
            autocomplete="username"
            required
          />
          <span class="field-error" data-error="username"></span>
        </div>

        <div class="form-group">
          <label for="password">Пароль</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            placeholder="Введите пароль"
            autocomplete="current-password"
            required
          />
          <span class="field-error" data-error="password"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          Войти
        </button>

      </form>

      <div class="login-footer">
        ГП «Склад» · Система учёта товарно-материальных ценностей
      </div>

    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
